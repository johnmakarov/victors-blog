{{ define "main" }}
  {{ .Content }}

  <div class="posts-header">
    <span>Дата /</span>
    <span>Название</span>
  </div>

  <div class="posts-container">
    {{ range where site.RegularPages "Type" "posts" }}
      <a href="{{ .RelPermalink }}" class="post-item">
        <div class="post-data">{{ .Date.Format "02.01.2006" }}</div>
        <h2>{{ .LinkTitle }}</h2>
        <div class="post-description">
          {{ .Plain | truncate 200 }}
        </div>
      </a>
    {{ end }}
  </div>
{{ end }}
