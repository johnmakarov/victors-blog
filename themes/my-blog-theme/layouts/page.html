{{ define "main" }}
  <div class="posts-header">
    <span>Дата /</span>
    <span>Название</span>
  </div>
  
  <div class="posts-container">
    <div class="post-item">
      <div class="post-data">{{ .Date.Format "02.01.2006" }}</div>
      <h2>{{ .LinkTitle }}</h2>
      
      <div class="post-description">
        <div class="toc-wrapper">
          <nav class="toc-nav">
            {{ .TableOfContents }}
          </nav>
        </div>
        {{ .Content }}
      </div>
    </div>
  </div>
{{ end }}
